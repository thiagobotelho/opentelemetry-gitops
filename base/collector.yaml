# Collector central leve para laboratório de nó único.
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: otel-collector
  namespace: observability
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  mode: deployment
  replicas: 1
  ports:
    - name: spanmetrics
      port: 8889
      targetPort: 8889
      protocol: TCP
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 400
        spike_limit_mib: 100
      batch:
        send_batch_size: 1024
        timeout: 5s
    connectors:
      span_metrics:
        histogram:
          explicit:
            buckets: [5ms, 10ms, 25ms, 50ms, 100ms, 250ms, 500ms, 1s, 2.5s, 5s, 10s]
    exporters:
      otlp_grpc/tempo:
        endpoint: tempo-tempo-monolithic-gateway.tempo.svc.cluster.local:4317
        auth:
          authenticator: bearertokenauth/tempo
        headers:
          x-scope-orgid: dev
        tls:
          insecure: false
          insecure_skip_verify: true
      debug:
        verbosity: basic
      prometheus:
        endpoint: 0.0.0.0:8889
    service:
      extensions:
        - bearertokenauth/tempo
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [otlp_grpc/tempo, span_metrics]
        metrics:
          receivers: [span_metrics]
          processors: [memory_limiter, batch]
          exporters: [prometheus]
      telemetry:
        metrics:
          level: basic
